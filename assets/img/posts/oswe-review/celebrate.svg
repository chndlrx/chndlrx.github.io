  <rect x="440" y="40" width="20" height="20" fill="#ffcc00" opacity="0.85"/>
  <rect x="720" y="60" width="20" height="20" fill="#ffcc00" opacity="0.8"/>
  <rect x="280" y="120" width="20" height="20" fill="#ffcc00" opacity="0.65"/>
