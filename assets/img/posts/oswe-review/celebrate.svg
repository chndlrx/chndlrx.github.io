  <!-- ===== "#1" on trophy ===== -->
  <rect x="456" y="208" width="12" height="8" fill="#fff" opacity="0.5"/>
  <rect x="468" y="208" width="20" height="8" fill="#fff" opacity="0.5"/>
  <rect x="476" y="216" width="12" height="8" fill="#fff" opacity="0.5"/>
  <rect x="476" y="224" width="12" height="8" fill="#fff" opacity="0.5"/>
  <rect x="476" y="232" width="12" height="8" fill="#fff" opacity="0.5"/>
  <rect x="456" y="240" width="48" height="8" fill="#fff" opacity="0.5"/>
