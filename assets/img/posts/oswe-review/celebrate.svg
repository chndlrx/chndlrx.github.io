  <rect x="400" y="120" width="20" height="20" fill="#33cc66" opacity="0.6"/>
  <rect x="100" y="80" width="20" height="20" fill="#33cc66" opacity="0.7"/>
  <rect x="760" y="108" width="20" height="20" fill="#33cc66" opacity="0.55"/>

