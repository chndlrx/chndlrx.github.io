  <rect x="660" y="80" width="16" height="16" fill="#fff" opacity="0.55"/>
  <rect x="200" y="100" width="16" height="16" fill="#fff" opacity="0.5"/>
  <rect x="860" y="60" width="16" height="16" fill="#fff" opacity="0.55"/>
  <rect x="480" y="80" width="16" height="16" fill="#fff" opacity="0.5"/>

