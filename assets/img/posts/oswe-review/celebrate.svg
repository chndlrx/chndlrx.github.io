  <rect x="132" y="160" width="20" height="20" fill="#f0c098"/>
  <rect x="144" y="180" width="20" height="20" fill="#ee3355"/>
  <rect x="152" y="200" width="16" height="20" fill="#ee3355"/>
  <!-- Right arm up -->
