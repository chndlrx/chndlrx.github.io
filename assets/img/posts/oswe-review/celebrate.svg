  <rect x="776" y="300" width="24" height="40" fill="#2244aa"/>
  <!-- Shoes -->
  <rect x="740" y="336" width="32" height="12" fill="#444"/>
  <rect x="772" y="336" width="32" height="12" fill="#444"/>
