  <rect x="712" y="160" width="20" height="20" fill="#e0b080"/>
  <rect x="724" y="180" width="20" height="20" fill="#22aa44"/>
  <rect x="732" y="200" width="16" height="20" fill="#22aa44"/>
  <!-- Right arm up -->
