  <rect x="78" y="28" width="32" height="8" fill="#fff" opacity="0.7"/>

  <!-- Right sparkle -->
  <rect x="856" y="16" width="8" height="28" fill="#fff" opacity="0.7"/>
  <rect x="844" y="24" width="32" height="8" fill="#fff" opacity="0.7"/>

