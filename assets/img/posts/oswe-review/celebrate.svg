  <rect x="320" y="80" width="20" height="20" fill="#ff3366" opacity="0.75"/>
  <rect x="620" y="40" width="20" height="20" fill="#ff3366" opacity="0.8"/>
  <rect x="880" y="80" width="20" height="20" fill="#ff3366" opacity="0.75"/>
  <rect x="500" y="100" width="20" height="20" fill="#ff3366" opacity="0.65"/>
  <rect x="140" y="120" width="20" height="20" fill="#ff3366" opacity="0.6"/>
