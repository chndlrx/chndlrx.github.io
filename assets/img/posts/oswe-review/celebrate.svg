  <rect x="400" y="160" width="160" height="20" fill="#eebb33"/>
  <rect x="400" y="260" width="160" height="20" fill="#cc9911"/>
  <!-- Cup inner shadow -->
  <rect x="420" y="180" width="120" height="60" fill="#cc9911"/>
  <rect x="440" y="180" width="80" height="40" fill="#ddaa22"/>
  <!-- Handles -->
  <rect x="360" y="180" width="40" height="20" fill="#ddaa22"/>
  <rect x="360" y="200" width="20" height="40" fill="#ddaa22"/>
  <rect x="360" y="240" width="40" height="20" fill="#ddaa22"/>
  <rect x="560" y="180" width="40" height="20" fill="#ddaa22"/>
  <rect x="580" y="200" width="20" height="40" fill="#ddaa22"/>
  <rect x="560" y="240" width="40" height="20" fill="#ddaa22"/>
