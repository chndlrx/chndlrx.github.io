<svg viewBox="0 0 1600 700" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title>MCP Servers Are API Gateways</title>
  <desc>Central MCP server card surrounded by six classical API security concern pills, showing that MCP servers inherit the traditional API threat model.</desc>

  <!-- UT Orange outer frame -->
  <rect x="0" y="0" width="1600" height="700" rx="20" fill="#FF8200"/>

  <!-- Title pill -->
  <rect x="470" y="48" width="660" height="56" rx="28" fill="#1E3A5F"/>
  <text x="800" y="82" text-anchor="middle" font-size="22" font-weight="500" fill="#ffffff">MCP servers are API gateways</text>

  <!-- Cream interior panel -->
  <rect x="60" y="140" width="1480" height="520" rx="16" fill="#FFF8F0"/>

  <!-- Top row of concern pills -->
  <rect x="140" y="200" width="320" height="68" rx="34" fill="#1E3A5F"/>
  <text x="300" y="232" text-anchor="middle" font-size="16" font-weight="500" fill="#ffffff">Input validation</text>
  <text x="300" y="253" text-anchor="middle" font-size="12" fill="#B8C5D6" font-style="italic">injection, malformed data</text>

  <rect x="640" y="200" width="320" height="68" rx="34" fill="#1E3A5F"/>
  <text x="800" y="232" text-anchor="middle" font-size="16" font-weight="500" fill="#ffffff">Authentication</text>
  <text x="800" y="253" text-anchor="middle" font-size="12" fill="#B8C5D6" font-style="italic">who is calling, with what token</text>

  <rect x="1140" y="200" width="320" height="68" rx="34" fill="#1E3A5F"/>
  <text x="1300" y="232" text-anchor="middle" font-size="16" font-weight="500" fill="#ffffff">Authorization</text>
  <text x="1300" y="253" text-anchor="middle" font-size="12" fill="#B8C5D6" font-style="italic">what they are allowed to do</text>

  <!-- Leader lines (dashed) from pills to center -->
  <line x1="300" y1="268" x2="580" y2="340" stroke="#1E3A5F" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="800" y1="268" x2="800" y2="330" stroke="#1E3A5F" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="1300" y1="268" x2="1020" y2="340" stroke="#1E3A5F" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>

  <!-- Central MCP server card -->
  <rect x="460" y="330" width="680" height="180" rx="16" fill="#ffffff" stroke="#1E3A5F" stroke-width="2"/>
  <rect x="490" y="352" width="170" height="40" rx="20" fill="#FF8200"/>
  <text x="575" y="377" text-anchor="middle" font-size="14" font-weight="500" fill="#ffffff">MCP server</text>

  <text x="800" y="426" text-anchor="middle" font-size="16" fill="#2D3748">A process that accepts a tool call, authenticates,</text>
  <text x="800" y="448" text-anchor="middle" font-size="16" fill="#2D3748">calls a downstream API, and returns the response.</text>
  <text x="800" y="480" text-anchor="middle" font-size="14" fill="#5A6B7D" font-style="italic">Which is to say: an API gateway with a JSON-RPC wrapper.</text>

  <!-- Leader lines from center to bottom pills -->
  <line x1="300" y1="572" x2="580" y2="510" stroke="#1E3A5F" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="800" y1="572" x2="800" y2="510" stroke="#1E3A5F" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="1300" y1="572" x2="1020" y2="510" stroke="#1E3A5F" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>

  <!-- Bottom row of concern pills -->
  <rect x="140" y="572" width="320" height="68" rx="34" fill="#1E3A5F"/>
  <text x="300" y="604" text-anchor="middle" font-size="16" font-weight="500" fill="#ffffff">Egress control</text>
  <text x="300" y="625" text-anchor="middle" font-size="12" fill="#B8C5D6" font-style="italic">where outbound calls can reach</text>

  <rect x="640" y="572" width="320" height="68" rx="34" fill="#1E3A5F"/>
  <text x="800" y="604" text-anchor="middle" font-size="16" font-weight="500" fill="#ffffff">Secret management</text>
  <text x="800" y="625" text-anchor="middle" font-size="12" fill="#B8C5D6" font-style="italic">how credentials are stored and scoped</text>

  <rect x="1140" y="572" width="320" height="68" rx="34" fill="#1E3A5F"/>
  <text x="1300" y="604" text-anchor="middle" font-size="16" font-weight="500" fill="#ffffff">Error handling</text>
  <text x="1300" y="625" text-anchor="middle" font-size="12" fill="#B8C5D6" font-style="italic">what the failure paths leak</text>

</svg>
